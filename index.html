Here is the complete HTML document that creates a "ONET CONNECT" match puzzle game with improved multiplayer UI and a pause menu featuring Reset and Back to Home options.
```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ONET CONNECT - Ultimate Match Puzzle Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a2f1f 0%, #0b3b2a 40%, #0f2c3b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 20px;
        }

        .game-container {
            width: 100%;
            max-width: 1400px;
            background: rgba(10, 25, 35, 0.65);
            backdrop-filter: blur(2px);
            border-radius: 56px;
            padding: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .screen { transition: opacity 0.25s ease; }

        .menu-logo {
            text-align: center;
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #F9F3C6, #C6F7E8, #6CFFB0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px #2ecc71;
            animation: floatGlow 3s infinite ease-in-out;
            margin-bottom: 30px;
        }

        @keyframes floatGlow {
            0% { transform: translateY(0px); text-shadow: 0 0 8px #2ecc71; }
            50% { transform: translateY(-8px); text-shadow: 0 0 25px #2ecc71; }
            100% { transform: translateY(0px); text-shadow: 0 0 8px #2ecc71; }
        }

        .menu-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
        }

        .btn-primary {
            background: linear-gradient(145deg, #1e2f3c, #0f212e);
            border: none;
            padding: 14px 34px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 0 #0a121c;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .btn-primary:active { transform: translateY(2px); box-shadow: 0 4px 0 #0a121c; }
        .btn-primary.disabled { opacity: 0.5; pointer-events: none; filter: grayscale(0.2);}
        .btn-secondary { background: #2c3e50; border: 1px solid #5dade2; }

        .stage-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
            max-height: 60vh;
            overflow-y: auto;
            padding: 10px;
        }

        .stage-card {
            background: #2c3e2f;
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .stage-card.unlocked { background: #f39c12; color:#1e2a1f; }
        .stage-card.completed { background: #2ecc71; color:white; }
        .stage-card.locked { background: #5d6d5c; color:#ccc; cursor: not-allowed; opacity:0.6; }

        .board-wrapper {
            display: flex;
            justify-content: center;
            overflow-x: auto;
            margin: 15px 0;
            position: relative;
        }

        .board {
            display: grid;
            background: #1e2a2f;
            border-radius: 32px;
            padding: 12px;
            gap: 8px;
            box-shadow: inset 0 0 0 2px #2a3f45, 0 20px 30px -10px black;
        }

        .tile {
            aspect-ratio: 1 / 1;
            background: linear-gradient(145deg, #fff, #f0f0f0);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: all 0.1s ease;
            box-shadow: 0 6px 0 #adadad;
            cursor: pointer;
            position: relative;
        }

        .tile.selected {
            transform: scale(1.05);
            box-shadow: 0 0 0 4px #4A90D9, 0 0 0 8px rgba(74,144,217,0.3);
        }

        .tile.ice::after {
            content: "❄️";
            position: absolute;
            font-size: 1.6rem;
            top: -5px;
            right: -5px;
            opacity: 0.9;
        }

        .tile.locked::before {
            content: "🔒";
            position: absolute;
            font-size: 1.2rem;
            left: 2px;
            bottom: 0px;
        }

        .tile.bomb::after {
            content: "💣";
            font-size: 1.2rem;
            position: absolute;
            top: -2px;
            right: -2px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .info-panel {
            background: #07161fcc;
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .timer {
            font-family: monospace;
            font-size: 2.2rem;
            font-weight: bold;
            background: #00000066;
            padding: 5px 18px;
            border-radius: 60px;
            letter-spacing: 4px;
        }

        .timer.warning { color: #f1c40f; animation: pulse 0.8s infinite; }
        .timer.danger { color: #e74c3c; animation: shake 0.4s infinite; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }

        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            background: linear-gradient(145deg, #1f2f2c, #152522);
            border-radius: 48px;
            padding: 30px;
            min-width: 300px;
            text-align: center;
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c3e50;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: bold;
            z-index: 1100;
            animation: fadeUp 2s forwards;
        }

        @keyframes fadeUp {
            0% { opacity: 0; bottom: 0; }
            10% { opacity: 1; bottom: 30px; }
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        .score, .multi-score {
            font-size: 1.5rem;
            font-weight: bold;
            background: #00000066;
            padding: 5px 18px;
            border-radius: 60px;
        }

        .progress-bar {
            width: 200px;
            height: 10px;
            background: #2c3e50;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #2ecc71;
            transition: width 0.3s ease;
        }
        
        .turn-indicator {
            background: #f39c12;
            color: #1e2a1f;
            font-weight: bold;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 1.2rem;
            box-shadow: 0 0 8px gold;
        }
        
        .room-badge {
            background: #2ecc71;
            padding: 4px 12px;
            border-radius: 32px;
            font-family: monospace;
            font-weight: bold;
        }

        @media (max-width: 760px) {
            .tile { font-size: 1.4rem; }
            .btn-primary { padding: 8px 18px; font-size: 1rem; }
            .menu-logo { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
    const ANIMALS = ['🐕','🐈','🐘','🦒','🐅','🦁','🐼','🐨','🐮','🐷','🐑','🐴','🦅','🦉','🦜','🐧','🦆','🦢','🐓','🦩','🦚','🐦','🐳','🐬','🐙','🦀','🦞','🐠','🐡','🦈','🐢','🦎','🐍','🐸','🐊','🦖','🦋','🐝','🐞','🦗','🐜','🦟'];
    
    function shuffleArray(arr) {
        for(let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    class GameOnetPro {
        constructor() {
            this.state = {
                activeScreen: 'menu',
                mode: null,
                board: [],
                rows: 8, cols: 8,
                selectedTile: null,
                score: 0,
                stageIndex: 1,
                timeLeft: 180,
                timerInterval: null,
                isPaused: false,
                isAnimating: false,
                iceMap: new Map(),
                lockedSet: new Set(),
                bombs: new Set(),
                bombTimes: new Map(),
                stageProgress: JSON.parse(localStorage.getItem('onet_progress') || '{}'),
                gravityEnabled: false,
                iceEnabled: false,
                lockEnabled: false,
                bombEnabled: false,
                hintUsed: 0, maxHints: 3,
                shuffleUsed: 0, maxShuffle: 5,
                lastMatchTime: 0,
                // Multiplayer
                roomCode: null, isHost: false,
                currentPlayerTurn: 0, myPlayerId: 0,
                turnRemaining: 10, turnTimer: null,
                multiScore: [0, 0],
                // global bomb interval
                bombInterval: null
            };
            this.init();
        }
        
        init() {
            this.loadSaveData();
            this.setupKeyboard();
            this.render();
        }
        
        loadSaveData() {
            try {
                let saved = localStorage.getItem('onet_save');
                if(saved) {
                    let data = JSON.parse(saved);
                    if(Date.now() - data.timestamp < 7 * 86400000) {
                        this.state.stageIndex = data.stage || 1;
                        this.state.score = data.score || 0;
                        if(data.progress) this.state.stageProgress = data.progress;
                    }
                }
            } catch(e) {}
        }
        
        saveGame() {
            try {
                localStorage.setItem('onet_save', JSON.stringify({
                    stage: this.state.stageIndex,
                    score: this.state.score,
                    progress: this.state.stageProgress,
                    timestamp: Date.now()
                }));
                let high = localStorage.getItem('onet_high') || 0;
                if(this.state.score > parseInt(high)) {
                    localStorage.setItem('onet_high', this.state.score);
                }
            } catch(e) {}
        }
        
        setupKeyboard() {
            document.addEventListener('keydown', (e) => {
                if(e.key === 'Escape' && (this.state.activeScreen === 'singleplayer' || this.state.activeScreen === 'multiplayerGame')) {
                    this.showPauseMenu();
                }
                if(e.key === 'h' && this.state.activeScreen === 'singleplayer') {
                    this.showHint();
                }
            });
        }
        
        stopAllTimers() {
            if(this.state.timerInterval) clearInterval(this.state.timerInterval);
            if(this.state.turnTimer) clearInterval(this.state.turnTimer);
            if(this.state.bombInterval) clearInterval(this.state.bombInterval);
            this.state.timerInterval = null;
            this.state.turnTimer = null;
            this.state.bombInterval = null;
        }
        
        resetCurrentGame() {
            if (this.state.activeScreen === 'singleplayer') {
                this.startStage(this.state.stageIndex, true);
            } else if (this.state.activeScreen === 'multiplayerGame') {
                this.resetMultiplayerMatch();
            }
        }
        
        backToHome() {
            this.stopAllTimers();
            this.state.activeScreen = 'menu';
            this.state.isPaused = false;
            this.render();
        }
        
        showPauseMenu() {
            if (this.state.isAnimating) return;
            this.state.isPaused = true;
            const modalDiv = document.createElement('div');
            modalDiv.className = 'modal';
            modalDiv.innerHTML = `
                <div class="modal-card">
                    <h2>⏸ GAME PAUSED</h2>
                    <div class="modal-buttons">
                        <button class="btn-primary" id="pauseResumeBtn">▶ RESUME</button>
                        <button class="btn-primary" id="pauseResetBtn">🔄 RESET GAME</button>
                        <button class="btn-primary" id="pauseHomeBtn">🏠 BACK TO HOME</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modalDiv);
            
            const resumeBtn = document.getElementById('pauseResumeBtn');
            const resetBtn = document.getElementById('pauseResetBtn');
            const homeBtn = document.getElementById('pauseHomeBtn');
            
            const closeModal = () => modalDiv.remove();
            
            resumeBtn.onclick = () => {
                this.state.isPaused = false;
                closeModal();
                this.render();
            };
            resetBtn.onclick = () => {
                closeModal();
                this.resetCurrentGame();
                this.state.isPaused = false;
            };
            homeBtn.onclick = () => {
                closeModal();
                this.backToHome();
            };
        }
        
        resetMultiplayerMatch() {
            this.stopAllTimers();
            this.generateBoard(); // fresh board
            this.state.multiScore = [0, 0];
            this.state.currentPlayerTurn = this.state.isHost ? 0 : 1;
            this.state.myPlayerId = this.state.isHost ? 0 : 1;
            this.state.turnRemaining = 10;
            this.state.selectedTile = null;
            this.state.isPaused = false;
            this.state.isAnimating = false;
            // reset specials maps
            this.state.iceMap.clear();
            this.state.lockedSet.clear();
            this.state.bombs.clear();
            this.state.bombTimes.clear();
            if(this.state.bombEnabled) this.initSpecialTiles();
            this.state.activeScreen = 'multiplayerGame';
            this.render();
            this.startTurnTimer();
            this.startBombTimerGlobal();
        }
        
        initSpecialTiles() {
            let total = this.state.rows * this.state.cols;
            if(this.state.iceEnabled) {
                let iceCount = Math.floor(total * 0.1);
                for(let n = 0; n < iceCount; n++) {
                    let r = Math.floor(Math.random() * this.state.rows);
                    let c = Math.floor(Math.random() * this.state.cols);
                    this.state.iceMap.set(`${r},${c}`, 0);
                }
            }
            if(this.state.lockEnabled) {
                let lockCount = Math.floor(total * 0.15);
                for(let n = 0; n < lockCount; n++) {
                    let r = Math.floor(Math.random() * this.state.rows);
                    let c = Math.floor(Math.random() * this.state.cols);
                    this.state.lockedSet.add(`${r},${c}`);
                }
            }
            if(this.state.bombEnabled) {
                let bombCount = 5;
                for(let n = 0; n < bombCount; n++) {
                    let r = Math.floor(Math.random() * this.state.rows);
                    let c = Math.floor(Math.random() * this.state.cols);
                    let key = `${r},${c}`;
                    this.state.bombs.add(key);
                    this.state.bombTimes.set(key, Date.now());
                }
            }
        }
        
        render() {
            const app = document.getElementById('app');
            if(this.state.activeScreen === 'menu') app.innerHTML = this.renderMenu();
            else if(this.state.activeScreen === 'stageSelect') app.innerHTML = this.renderStageSelect();
            else if(this.state.activeScreen === 'singleplayer') app.innerHTML = this.renderGame();
            else if(this.state.activeScreen === 'multiplayerLobby') app.innerHTML = this.renderLobby();
            else if(this.state.activeScreen === 'multiplayerGame') app.innerHTML = this.renderMultiGame();
            this.bindEvents();
            if(this.state.activeScreen === 'singleplayer' || this.state.activeScreen === 'multiplayerGame') {
                setTimeout(() => this.renderBoard(), 20);
            }
        }
        
        renderMenu() {
            let high = localStorage.getItem('onet_high') || 0;
            let hasSave = !!localStorage.getItem('onet_save');
            return `
                <div class="screen">
                    <div class="menu-logo">✨ ONET CONNECT ✨</div>
                    <div class="menu-buttons">
                        <button class="btn-primary" data-action="newGame">🎮 NEW GAME</button>
                        <button class="btn-primary ${!hasSave ? 'disabled' : ''}" data-action="continueGame">▶️ CONTINUE</button>
                        <button class="btn-primary" data-action="multiplayer">🌐 MULTIPLAYER</button>
                        <button class="btn-primary" data-action="howto">📘 HOW TO PLAY</button>
                    </div>
                    <div class="info-panel">
                        <span>🏆 HIGH SCORE: ${high}</span>
                        <span>⭐ STAGES CLEARED: ${Object.keys(this.state.stageProgress).length}</span>
                    </div>
                </div>
            `;
        }
        
        renderStageSelect() {
            let html = `<div class="screen"><h2 style="color:white; text-align:center;">SELECT STAGE</h2><div class="stage-grid">`;
            for(let i = 1; i <= 50; i++) {
                let completed = this.state.stageProgress[i]?.completed;
                let unlocked = (i === 1) || this.state.stageProgress[i-1]?.completed;
                let status = completed ? 'completed' : (unlocked ? 'unlocked' : 'locked');
                let stars = this.state.stageProgress[i]?.stars || 0;
                html += `<div class="stage-card ${status}" data-stage="${i}"><div>STAGE ${i}</div><div style="font-size:0.8rem;">${status === 'completed' ? '⭐'.repeat(stars) : (status === 'unlocked' ? '🔓' : '🔒')}</div></div>`;
            }
            html += `</div><div style="text-align:center; margin-top:20px;"><button class="btn-primary" data-action="backMenu">🔙 BACK</button></div></div>`;
            return html;
        }
        
        renderGame() {
            let remaining = this.getRemainingPercent();
            return `
                <div class="screen">
                    <div class="info-panel">
                        <div class="score">💯 SCORE: ${this.state.score}</div>
                        <div class="timer" id="timerDisplay">${this.formatTime(this.state.timeLeft)}</div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${remaining}%"></div></div>
                        <div style="display:flex; gap:10px;">
                            <button class="btn-primary" data-action="pauseMenu">⏸️ PAUSE</button>
                            <button class="btn-primary" data-action="shuffle">🃏 SHUFFLE (${this.state.shuffleUsed}/${this.state.maxShuffle})</button>
                            <button class="btn-primary" data-action="hint">💡 HINT (${this.state.hintUsed}/${this.state.maxHints})</button>
                        </div>
                    </div>
                    <div class="board-wrapper">
                        <div id="boardContainer" style="position:relative"></div>
                        <canvas id="lineCanvas" style="position:absolute; top:0; left:0; pointer-events:none;"></canvas>
                    </div>
                </div>
            `;
        }
        
        renderMultiGame() {
            const isMyTurn = (this.state.currentPlayerTurn === this.state.myPlayerId);
            return `
                <div class="screen">
                    <div class="info-panel" style="flex-wrap:wrap;">
                        <div class="room-badge">🏠 ROOM: ${this.state.roomCode || 'LOCAL'}</div>
                        <div class="multi-score">👤 YOU: ${this.state.multiScore[this.state.myPlayerId]}</div>
                        <div class="multi-score">👥 OPPONENT: ${this.state.multiScore[1 - this.state.myPlayerId]}</div>
                        <div class="turn-indicator">${isMyTurn ? '🔵 YOUR TURN' : '🔴 OPPONENT TURN'}</div>
                        <div class="timer" id="turnTimerDisplay">⏱️ ${this.state.turnRemaining}s</div>
                        <button class="btn-primary" data-action="pauseMenu">⏸️ PAUSE</button>
                        <button class="btn-primary" data-action="multiShuffle">🃏 SHUFFLE</button>
                    </div>
                    <div class="board-wrapper">
                        <div id="boardContainer" style="position:relative"></div>
                        <canvas id="lineCanvas" style="position:absolute; top:0; left:0; pointer-events:none;"></canvas>
                    </div>
                </div>
            `;
        }
        
        renderLobby() {
            return `
                <div class="screen">
                    <div class="menu-logo">🌐 MULTIPLAYER</div>
                    <div class="menu-buttons">
                        <button class="btn-primary" data-action="createRoom">🏠 CREATE ROOM</button>
                        <button class="btn-primary" data-action="joinRoom">🔑 JOIN ROOM</button>
                    </div>
                    ${this.state.roomCode ? `<div style="text-align:center; color:white; background:#00000066; padding:20px; border-radius:20px; margin:20px;"><h2>ROOM CODE: ${this.state.roomCode}</h2><p>Waiting for opponent...</p></div>` : ''}
                    <button class="btn-primary" data-action="backMenu">🔙 BACK</button>
                </div>
            `;
        }
        
        formatTime(sec) { let m = Math.floor(sec / 60); let s = sec % 60; return `${m}:${s < 10 ? '0' + s : s}`; }
        getRemainingPercent() { let total = this.state.rows * this.state.cols; let count = 0; for(let i=0;i<this.state.rows;i++) for(let j=0;j<this.state.cols;j++) if(this.state.board[i][j] !== null) count++; return (count / total) * 100; }
        
        bindEvents() {
            document.querySelectorAll('[data-action]').forEach(el => {
                el.onclick = (e) => {
                    let action = el.dataset.action;
                    if(action === 'newGame') this.state.activeScreen = 'stageSelect', this.render();
                    if(action === 'continueGame') this.continueGame();
                    if(action === 'multiplayer') this.state.activeScreen = 'multiplayerLobby', this.render();
                    if(action === 'backMenu') this.backToHome();
                    if(action === 'howto') this.showHowTo();
                    if(action === 'createRoom') this.createRoom();
                    if(action === 'joinRoom') { let code = prompt("Enter Room Code:"); if(code) this.joinRoom(code.toUpperCase()); }
                    if(action === 'pauseMenu') this.showPauseMenu();
                    if(action === 'shuffle') this.shuffleBoard();
                    if(action === 'multiShuffle') this.shuffleBoard();
                    if(action === 'hint') this.showHint();
                };
            });
            document.querySelectorAll('.stage-card').forEach(el => { if(!el.classList.contains('locked')) el.onclick = () => this.startStage(parseInt(el.dataset.stage)); });
        }
        
        continueGame() { if(localStorage.getItem('onet_save')) this.startStage(this.state.stageIndex); }
        showHowTo() { alert("ONET CONNECT - RULES:\n• Connect two identical tiles with max 2 corners\n• Clear board before time runs out\n❄️ ICE: hit twice\n🔒 LOCKED: match 3 normal pairs first\n💣 BOMB: 15 seconds to match!"); }
        
        startStage(stageNum, resetSame = false) {
            if(!resetSame && this.state.timerInterval) this.stopAllTimers();
            this.state.stageIndex = stageNum;
            this.state.mode = 'single';
            if(!resetSame) this.state.score = 0;
            this.state.selectedTile = null;
            this.state.hintUsed = 0;
            this.state.shuffleUsed = 0;
            this.state.lastMatchTime = 0;
            this.state.isPaused = false;
            this.state.iceMap.clear(); this.state.lockedSet.clear(); this.state.bombs.clear(); this.state.bombTimes.clear();
            let cfg = this.getConfig(stageNum);
            this.state.rows = cfg.rows; this.state.cols = cfg.cols; this.state.timeLeft = cfg.time;
            this.state.maxHints = cfg.hints; this.state.maxShuffle = cfg.shuffles;
            this.state.gravityEnabled = cfg.gravity; this.state.iceEnabled = cfg.ice;
            this.state.lockEnabled = cfg.lock; this.state.bombEnabled = cfg.bomb;
            this.generateBoard();
            if(this.state.iceEnabled || this.state.lockEnabled || this.state.bombEnabled) this.initSpecialTiles();
